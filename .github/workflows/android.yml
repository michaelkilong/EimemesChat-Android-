name: Android Build

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Print debug SHA-1
        run: |
          $ANDROID_HOME/build-tools/$(ls $ANDROID_HOME/build-tools | tail -1)/apksigner verify --print-certs app/build/outputs/apk/debug/app-debug.apk | grep SHA-1

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: EimemesChat-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Decode keystore
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 --decode > app/keystore.jks

      - name: Build release APK
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          KEY_ALIAS:      ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:   ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v1
        with:
          files: app/build/outputs/apk/release/app-release.apk
          name: EimemesChat AI ${{ github.ref_name }}
          body: |
            ## EimemesChat AI ${{ github.ref_name }}
            Download the APK below and install on your Android device (Android 8.0+).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
